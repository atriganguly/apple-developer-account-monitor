name: Apple Developer Account Monitor Engine

on:
  schedule:
    - cron: '0 0 * * *'  # Fire automatically exactly once a day at 00:00 UTC for the Smart Guard Check
  workflow_dispatch:      # Receives manual parameters directly from the Web Dashboard Panel
    inputs:
      mode:
        description: 'Execution Mode Profile'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape
          - keep-alive
      dev_mode:
        description: 'Throttling Check'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      keep_alive_days:
        description: 'Keep-Alive Execution Frequency Interval (Days)'
        required: true
        default: '3'
      scrape_days:
        description: 'Production Scrape Ingestion Frequency Interval (Days)'
        required: true
        default: '14'

jobs:
  automation-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Application Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Provision Playwright Headless Browser Engines
        run: playwright install chromium --with-deps

      - name: De-serialize Google Service Account Credentials
        run: echo '${{ secrets.GOOGLE_CREDS_JSON }}' > creds.json

      - name: Reconstruct System Environment Configuration Matrix
        run: |
          echo "APPLE_EMAIL=${{ secrets.APPLE_EMAIL }}" >> .env
          echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> .env
          echo "GOOGLE_SHEET_ID=${{ secrets.GOOGLE_SHEET_ID }}" >> .env
          echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}" >> .env
          echo "GOOGLE_SHEET_RANGE='Apple Developer Account Monitor'!A2" >> .env
          echo "PLAYWRIGHT_HEADLESS=True" >> .env

      - name: Execute Core Automation Processing Loop
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Launching Daily Smart Guard Check..."
            python main.py --mode scheduled
          else
            ARGS="--mode ${{ github.event.inputs.mode }} --keep-alive-days ${{ github.event.inputs.keep_alive_days }} --scrape-days ${{ github.event.inputs.scrape_days }}"
            if [ "${{ github.event.inputs.dev_mode }}" = "true" ]; then
              ARGS="$ARGS --dev"
            fi
            echo "Launching manual request: python main.py $ARGS"
            python main.py $ARGS
          fi