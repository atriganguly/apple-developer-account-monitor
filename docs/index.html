<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Developer Monitor Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-gray-800 border-b border-gray-700 p-5 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide text-blue-400"> Developer Account Monitor</h1>
            <span id="connection-status" class="px-3 py-1 text-xs font-semibold rounded-full bg-red-900/50 text-red-400 border border-red-700">Disconnected</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6 w-full flex-grow space-y-6">
        
        <section class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow">
            <h2 class="text-lg font-semibold text-gray-300 mb-3">1. Secure Gateway Authentication</h2>
            <div class="space-y-3">
                <label class="block text-sm text-gray-400">GitHub Personal Access Token (Classic with 'workflow' scope)</label>
                <div class="flex gap-3">
                    <input type="password" id="gh-token" placeholder="Paste ghp_..." class="bg-gray-900 border border-gray-700 rounded p-2 flex-grow text-sm focus:outline-none focus:border-blue-500 text-blue-300">
                    <button id="btn-lock" onclick="toggleAuthLock()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-5 rounded text-sm transition">Connect Vault</button>
                </div>
            </div>
        </section>

        <section id="panel-controls" class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow opacity-50 pointer-events-none transition-opacity">
            <h2 class="text-lg font-semibold text-gray-300 mb-4">2. Execution Profile Parameter Matrix</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="space-y-2">
                    <label class="block text-sm text-gray-400">Pipeline Pipeline Mode</label>
                    <select id="run-mode" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="scrape">Full Ingestion Scrape (Updates Google Sheet)</option>
                        <option value="keep-alive"> легкий Session Keep-Alive Pulse (Renew Cookies)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm text-gray-400">Development Throttling Boundary</label>
                    <select id="dev-mode" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-sm focus:outline-none focus:border-blue-500">
                        <option value="false">Production Mode (Processes All Registered Teams)</option>
                        <option value="true">Sandbox Dev Mode (Cap Run at First 5 Teams)</option>
                    </select>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-700 flex justify-end">
                <button id="btn-trigger" onclick="dispatchWorkflow()" class="bg-green-600 hover:bg-green-500 text-white font-semibold py-2.5 px-6 rounded text-sm tracking-wide shadow transition flex items-center gap-2">
                    Launch Headless Engine Now
                </button>
            </div>
        </section>

        <section id="panel-monitor" class="bg-gray-800 p-5 rounded-lg border border-gray-700 shadow opacity-50 pointer-events-none transition-opacity">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-300">3. Live Cloud Execution Tracker</h2>
                <button onclick="fetchLatestRuns()" class="text-xs text-blue-400 hover:underline">Force Refresh Status</button>
            </div>
            
            <div id="runs-container" class="space-y-3 max-h-60 overflow-y-auto pr-2">
                <p class="text-sm text-gray-500 italic">No historical runs retrieved yet.</p>
            </div>
        </section>
    </main>

    <footer class="bg-gray-900 border-t border-gray-800 p-4 text-center text-xs text-gray-600">
        Secure Static Frontend Gateway • Data Communicates Direct To GitHub Rest Architecture APIs
    </footer>

    <script>
        // Dedicated Repository Coordinates
        const OWNER = "atriganguly";
        const REPO = "apple-developer-account-monitor";
        const WORKFLOW_FILE = "monitor.yml";

        let pollInterval = null;

        // Auto-load token from local memory cache if it exists
        document.addEventListener("DOMContentLoaded", () => {
            const cachedToken = localStorage.getItem("app_monitor_pat");
            if (cachedToken) {
                document.getElementById("gh-token").value = cachedToken;
                toggleAuthLock();
            }
        });

        function toggleAuthLock() {
            const tokenInput = document.getElementById("gh-token");
            const lockBtn = document.getElementById("btn-lock");
            const controls = document.getElementById("panel-controls");
            const monitor = document.getElementById("panel-monitor");
            const statusIndicator = document.getElementById("connection-status");

            if (lockBtn.innerText === "Connect Vault") {
                if (!tokenInput.value.trim().startsWith("ghp_")) {
                    alert("Validation Check Failed: Please provide a valid GitHub Personal Access Token (Classic classic structure).");
                    return;
                }
                localStorage.setItem("app_monitor_pat", tokenInput.value.trim());
                tokenInput.disabled = true;
                lockBtn.innerText = "Disconnect Vault";
                lockBtn.className = "bg-red-700 hover:bg-red-600 text-white font-medium px-5 rounded text-sm transition";
                controls.classList.remove("opacity-50", "pointer-events-none");
                monitor.classList.remove("opacity-50", "pointer-events-none");
                statusIndicator.innerText = "Vault Connected";
                statusIndicator.className = "px-3 py-1 text-xs font-semibold rounded-full bg-green-900/50 text-green-400 border border-green-700";
                
                fetchLatestRuns();
                pollInterval = setInterval(fetchLatestRuns, 10000); // Polling loop every 10 seconds
            } else {
                localStorage.removeItem("app_monitor_pat");
                tokenInput.value = "";
                tokenInput.disabled = false;
                lockBtn.innerText = "Connect Vault";
                lockBtn.className = "bg-blue-600 hover:bg-blue-500 text-white font-medium px-5 rounded text-sm transition";
                controls.classList.add("opacity-50", "pointer-events-none");
                monitor.classList.add("opacity-50", "pointer-events-none");
                statusIndicator.innerText = "Disconnected";
                statusIndicator.className = "px-3 py-1 text-xs font-semibold rounded-full bg-red-900/50 text-red-400 border border-red-700";
                clearInterval(pollInterval);
            }
        }

        async function dispatchWorkflow() {
            const token = localStorage.getItem("app_monitor_pat");
            const mode = document.getElementById("run-mode").value;
            const devMode = document.getElementById("dev-mode").value;
            const triggerBtn = document.getElementById("btn-trigger");

            triggerBtn.disabled = true;
            triggerBtn.innerText = "Transmitting Command...";

            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/vnd.github+json",
                        "X-GitHub-Api-Version": "2022-11-28",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        ref: "main",
                        inputs: { mode: mode, dev_mode: devMode }
                    })
                });

                if (response.status === 204) {
                    alert("🚀 Core Script Dispatched Successfully! The container is booting up right now.");
                    setTimeout(fetchLatestRuns, 3000);
                } else {
                    const data = await response.json();
                    alert(`API Rejection Warning: ${data.message}`);
                }
            } catch (err) {
                alert(`Network failure connecting to GitHub REST interface: ${err}`);
            } finally {
                triggerBtn.disabled = false;
                triggerBtn.innerText = "Launch Headless Engine Now";
            }
        }

        async function fetchLatestRuns() {
            const token = localStorage.getItem("app_monitor_pat");
            if (!token) return;

            try {
                const url = `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=5`;
                const response = await fetch(url, {
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Accept": "application/vnd.github+json",
                        "X-GitHub-Api-Version": "2022-11-28"
                    }
                });
                
                if (!response.ok) return;
                const data = await response.json();
                const container = document.getElementById("runs-container");
                container.innerHTML = "";

                if (data.workflow_runs.length === 0) {
                    container.innerHTML = `<p class="text-sm text-gray-500 italic">No cloud histories detected.</p>`;
                    return;
                }

                data.workflow_runs.forEach(run => {
                    const statusColors = {
                        completed: "bg-gray-900 border-gray-700 text-gray-400",
                        in_progress: "bg-blue-950/40 border-blue-800 text-blue-400 animate-pulse",
                        queued: "bg-yellow-950/40 border-yellow-800 text-yellow-400 animate-pulse"
                    };
                    
                    const conclusionColors = {
                        success: "text-green-400 font-bold",
                        failure: "text-red-400 font-bold",
                        cancelled: "text-gray-500 font-bold"
                    };

                    const runStatus = run.status;
                    const conclusion = run.conclusion ? ` (${run.conclusion.toUpperCase()})` : "";
                    const conclusionClass = run.conclusion ? conclusionColors[run.conclusion] || "" : "";
                    const badgeClass = statusColors[runStatus] || "bg-gray-900 border-gray-700 text-gray-400";

                    const div = document.createElement("div");
                    div.className = `p-3 rounded border text-sm flex justify-between items-center ${badgeClass}`;
                    div.innerHTML = `
                        <div>
                            <p class="font-semibold text-gray-200">Run #${run.run_number} - Event: ${run.event.toUpperCase()}</p>
                            <p class="text-xs text-gray-400 mt-1">Started: ${new Date(run.created_at).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs uppercase px-2 py-0.5 rounded font-mono border border-current">${runStatus}</span>
                            <p class="text-xs mt-1 ${conclusionClass}">${conclusion}</p>
                        </div>
                    `;
                    container.appendChild(div);
                });

            } catch (err) {
                console.error("Status check loop dropped context:", err);
            }
        }
    </script>
</body>
</html>
